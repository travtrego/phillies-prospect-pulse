name: Daily Injury Update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * *"

permissions:
  contents: write

jobs:
  update-injuries:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build injury report
        run: node scripts/update-injuries.mjs

      - name: Save updated report
        run: |
          if git diff --quiet -- data/injuries.json; then
            echo "No changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/injuries.json
          git commit -m "Update Phillies affiliate injury report"
          git push
