name: Daily Prospect Update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * *"

permissions:
  contents: write

jobs:
  update-prospect-data:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Build shared news feed
        run: node scripts/update-news.mjs

      - name: Build injury report
        run: node scripts/update-injuries.mjs

      - name: Build promotions feed
        run: node scripts/update-promotions.mjs

      - name: Build current stats
        run: node scripts/update-stats.mjs

      - name: Build prospect rankings
        run: node scripts/update-rankings.mjs

      - name: Save updated reports
        run: |
          if git diff --quiet -- data/news.json data/injuries.json data/promotions.json data/stats.json data/rankings.json; then
            echo "No changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/injuries.json data/promotions.json data/stats.json data/rankings.json
          git commit -m "Update Phillies prospect news, injuries, promotions, stats and rankings"
          git push
