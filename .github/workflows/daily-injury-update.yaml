name: Daily Prospect Update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * *"

permissions:
  contents: write

jobs:
  update-prospect-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Build shared news feed
        run: node scripts/update-news.mjs

      - name: Build injury report
        run: node scripts/update-injuries.mjs

      - name: Save updated reports
        run: |
          if git diff --quiet -- data/news.json data/injuries.json; then
            echo "No changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/injuries.json
          git commit -m "Update Phillies prospect news and injuries"
          git push
