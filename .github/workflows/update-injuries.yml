name: Update Phillies affiliate injuries

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-injuries
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh injury data
        run: node scripts/update-injuries.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- data/injuries.json; then
            echo "No injury-feed changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/injuries.json
          git commit -m "Update Phillies affiliate injury report"
          git push
