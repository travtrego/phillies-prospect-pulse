name: Genie Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Audit Genie data
        run: npm run audit:genie
      - name: Test Genie logic
        run: npm run test:genie
      - name: Type-check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run typecheck -- --pretty false > typecheck.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat typecheck.log
          exit 0
      - name: Production build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat build.log
          exit 0
      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: genie-quality-logs
          path: |
            typecheck.log
            build.log
      - name: Enforce quality result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.typecheck.outputs.exit_code }}" != "0" ]; then
            echo "TypeScript validation failed."
            exit 1
          fi
          if [ "${{ steps.build.outputs.exit_code }}" != "0" ]; then
            echo "Production build failed."
            exit 1
          fi
