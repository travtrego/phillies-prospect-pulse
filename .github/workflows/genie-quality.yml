name: Genie Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Audit Genie data
        run: npm run audit:genie
      - name: Audit player cards and tabs
        run: npm run audit:ui
      - name: Test Genie logic
        run: npm run test:genie
      - name: Type-check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run typecheck -- --pretty false > typecheck.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat typecheck.log
          exit 0
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: genie-typecheck-log
          path: typecheck.log
      - name: Enforce type-check
        if: always()
        run: test "${{ steps.typecheck.outputs.exit_code }}" = "0"
      - name: Production build
        run: npm run build
