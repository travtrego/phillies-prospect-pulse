name: Genie Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Audit Genie data
        run: npm run audit:genie
      - name: Audit player cards and tabs
        run: npm run audit:ui
      - name: Backtest ranking model
        run: npm run backtest:rankings
      - name: Test Genie and ranking logic
        run: npm run test:genie
      - name: Type-check
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck -- --pretty false 2>&1 | tee typecheck.log
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranking-typecheck-log
          path: typecheck.log
      - name: Production build
        run: npm run build
